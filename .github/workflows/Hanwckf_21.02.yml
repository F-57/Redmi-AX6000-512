name: Redmi-AX6000-hanwckf

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启 SSH 调试 (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/hanwckf/immortalwrt-mt798x
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  # ccache 存放路径
  CCACHE_DIR: /mnt/ccache

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /etc/apt/sources.list.d/* /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -qq update
        sudo -E apt-get -qq install $(curl -fsSL git.io/depends-ubuntu-2004)
        sudo -E apt-get -qq autoremove --purge
        sudo -E apt-get -qq clean
        sudo -E apt-get -qq ccache

        # 4. 调用官方脚本补充剩下的依赖
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        
        # 5. 设置时区并准备挂载大空间分区
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /mnt/workdir
        sudo chown $USER:$GROUPS /mnt/workdir /mnt/ccache
        ln -sf /mnt/workdir $GITHUB_WORKSPACE/workdir

    - name: 下载固件源码
      working-directory: /mnt/workdir
      run: |
        df -hT .
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 开启缓存加速 (dl库与ccache)
      uses: actions/cache@v4
      with:
        path: |
          /mnt/workdir/openwrt/dl
          ${{ env.CCACHE_DIR }}
        key: ${{ runner.os }}-hanwckf-${{ env.REPO_BRANCH }}-${{ hashFiles('.config') }}
        restore-keys: |
          ${{ runner.os }}-hanwckf-${{ env.REPO_BRANCH }}-

    - name: 加载feeds.conf.default & DIY_P1_SH
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 & 安装 feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: 加载配置 & 注入优化
      run: |
        # 1. 移动原始配置文件
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        
        # 2. 注入优化选项 (这些必须在 defconfig 之前写入)
        echo "CONFIG_CCACHE=y" >> .config
        echo "CONFIG_CCACHE_DIR=\"${{ env.CCACHE_DIR }}\"" >> .config
        echo "CONFIG_KERNEL_DEBUG_INFO=n" >> .config
        echo "CONFIG_OPENSSL_OPTIMIZE_SPEED=y" >> .config
        echo "CONFIG_STRIP_KERNEL_EXPORTS=y" >> .config
        
        # 3. 执行自定义脚本 (里面可能还有其他的 sed 修改)
        $GITHUB_WORKSPACE/$DIY_P2_SH
        
        # 4. 核心：执行 defconfig 同步并校验所有配置
        # 这是第二次编译不报错的关键，因为它会确保配置文件的指纹是正确的
        make defconfig

    - name: 下载安装包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j$(nproc)
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        # 1. 设置 ccache 环境 (提速核心)
        export CCACHE_DIR=${{ env.CCACHE_DIR }}
        ccache -z # 重置统计信息，方便查看本次命中率
        
        # 2. 开始编译 (多线程失败则切换单线程输出详细错误)
        echo "使用 $(nproc) 线程加速编译..."
        make -j$(nproc) || make -j1 V=s
        
        # 3. 编译完成后处理环境变量
        ccache -s # 打印缓存命中率
        echo "COMPILE_STATUS=success" >> $GITHUB_ENV
        
        # 定义设备名称 (建议使用更详细的 mediatek_mt7986_redmi_ax6000)
        echo "DEVICE_NAME=mediatek_mt7986_redmi_ax6000" >> $GITHUB_ENV
        
        # 设置日期 (建议用 YYYYMMDD 格式，避免文件名和 Release Tag 冲突)
        echo "FILE_DATE=$(date +"%Y%m%d%H%M")" >> $GITHUB_ENV

    - name: SSH 链接管理 (仅编译失败或手动勾选时触发)
      uses: P3TERX/ssh2actions@v1.0.0
      if: failure() || (github.event.inputs.ssh == 'true')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理文件并重命名
      id: organize
      if: env.COMPILE_STATUS == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "ORGANIZE_STATUS=success" >> $GITHUB_ENV

    - name: 上传固件到 artifact
      uses: actions/upload-artifact@v4
      if: env.ORGANIZE_STATUS == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.DEVICE_NAME }}_${{ env.FILE_DATE }}
        path: ${{ env.FIRMWARE }}

    - name: 固件发布
      id: release
      uses: ncipollo/release-action@v1
      if: env.ORGANIZE_STATUS == 'success' && env.UPLOAD_RELEASE == 'true' && !cancelled()
      with:
        tag: v${{ env.FILE_DATE }}-redmi_ax6000
        removeArtifacts: false
        artifacts: ${{ env.FIRMWARE }}/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          Redmi AX6000 硬改 512MB Flash 专用固件
          基于 hanwckf/immortalwrt-mt798x (5.4内核)
          
          编译时间: ${{ env.FILE_DATE }}
          管理地址: 10.0.0.1 (root/password)
          Wi-Fi: Ax6000 / cw010203
          
          已集成插件：
          ├ OpenClash / MosDNS / AdGuardHome
          ├ Lucky / Openlist
          └ 闭源高性能 Wi-Fi 驱动

    - name: 发送 Telegram 状态通知
      uses: appleboy/telegram-action@master
      if: always()
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          项目: ${{ github.repository }}
          状态: ${{ job.status == 'success' && '✅ 编译成功' || '❌ 编译失败' }}
          设备: ${{ env.DEVICE_NAME }}
          时间: ${{ env.FILE_DATE }}
          链接: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: 删除工作流程运行
      uses: Mattraks/delete-workflow-runs@main
      if: env.ORGANIZE_STATUS == 'success' && !cancelled()
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 1
        keep_minimum_runs: 2

    - name: 删除旧版本
      uses: dev-drprasad/delete-older-releases@master
      if: env.ORGANIZE_STATUS == 'success' && !cancelled()
      with:
        repo: ${{ github.repository }}
        keep_latest: 2
        delete_tag_pattern: 'redmi_ax6000'
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
