name: Redmi-AX6000-hanwckf

on:
  repository_dispatch:
  workflow_dispatch:
    inputs:
      ssh:
        description: '是否开启 SSH 调试 (true/false)'
        required: false
        default: 'false'

env:
  REPO_URL: https://github.com/Yuzhii0718/immortalwrt-mt798x-hanwckf
  REPO_BRANCH: openwrt-21.02
  FEEDS_CONF: feeds.conf.default
  CONFIG_FILE: .config
  DIY_P1_SH: diy-part1.sh
  DIY_P2_SH: diy-part2.sh
  UPLOAD_FIRMWARE: true
  UPLOAD_RELEASE: true
  TZ: Asia/Shanghai
  TARGET: mt798x
  GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
    - name: 检查项目分支
      uses: actions/checkout@main

    - name: 初始化编译环境
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo -E apt-get -yqq update
        sudo -E apt-get -yqq install curl dos2unix python3-netifaces libfuse-dev
        sudo bash -c 'bash <(curl -sL https://build-scripts.immortalwrt.org/init_build_environment.sh)'
        sudo -E apt-get -yqq autoremove --purge
        sudo -E apt-get -yqq clean
        sudo timedatectl set-timezone "$TZ"
        sudo mkdir -p /mnt/workdir
        sudo chown $USER:$GROUPS /mnt/workdir

    - name: 下载固件源码
      working-directory: /mnt/workdir
      run: |
        df -hT $PWD
        git clone $REPO_URL -b $REPO_BRANCH openwrt
        ln -sf /mnt/workdir/openwrt $GITHUB_WORKSPACE/openwrt

    - name: 处理脚本格式
      run: |
        find ./ -maxdepth 3 -type f -iregex ".*\(txt\|sh\)$" -exec dos2unix {} \; -exec chmod +x {} \;

    - name: 检查并读取缓存
      id: check-cache
      if: env.WRT_TEST != 'true'
      uses: actions/cache@main
      with:
        key: ${{ env.TARGET }}-${{ env.REPO_BRANCH }}-${{ hashFiles('.config') }}
        restore-keys: |
          ${{ env.TARGET }}-${{ env.REPO_BRANCH }}-
        path: |
          ./openwrt/.ccache
          ./openwrt/staging_dir/host*
          ./openwrt/staging_dir/tool*

    - name: 维护与更新缓存
      if: env.WRT_TEST != 'true' && !cancelled()
      run: |
        if [ -d "./openwrt/staging_dir" ]; then
          find "./openwrt/staging_dir" -type d -name "stamp" -not -path "*target*" | while read -r DIR; do
            find "$DIR" -type f -exec touch {} +
          done
          mkdir -p ./openwrt/tmp && echo "1" > ./openwrt/tmp/.build
          echo "已成功跳过工具链!"
        else
          echo "缓存丢失!"
        fi
        if [ "${{ steps.check-cache.outputs.cache-hit }}" != 'true' ]; then
          gh cache list --key "${{ env.TARGET }}-${{ env.REPO_BRANCH }}" | cut -f 1 | xargs -r -n 1 gh cache delete || true
          echo "旧缓存清理完毕!"
        fi

    - name: 加载自定义feeds
      run: |
        [ -e $FEEDS_CONF ] && mv $FEEDS_CONF openwrt/feeds.conf.default
        chmod +x $DIY_P1_SH
        cd openwrt
        $GITHUB_WORKSPACE/$DIY_P1_SH

    - name: 更新 feeds
      run: cd openwrt && ./scripts/feeds update -a

    - name: 安装 feeds
      run: cd openwrt && ./scripts/feeds install -a

    - name: 加载配置 & 注入优化
      run: |
        [ -e files ] && mv files openwrt/files
        [ -e $CONFIG_FILE ] && mv $CONFIG_FILE openwrt/.config
        chmod +x $DIY_P2_SH
        cd openwrt
        echo "CONFIG_CCACHE=y" >> .config
        echo "CONFIG_TARGET_ROOTFS_INITRAMFS=n" >> .config
        echo "CONFIG_KERNEL_DEBUG_INFO=n" >> .config
        echo "CONFIG_OPENSSL_OPTIMIZE_SPEED=y" >> .config
        $GITHUB_WORKSPACE/$DIY_P2_SH

    - name: 下载安装包
      id: package
      run: |
        cd openwrt
        make defconfig
        make download -j8
        find dl -size -1024c -exec ls -l {} \;
        find dl -size -1024c -exec rm -f {} \;

    - name: 编译固件
      id: compile
      run: |
        cd openwrt
        echo -e "$(nproc) thread compile"
        make -j$(nproc) || make -j1 V=s
        echo "COMPILE_STATUS=success" >> $GITHUB_ENV
        echo "mediatek_mt7986_redmi_ax6000" > DEVICE_NAME
        [ -s DEVICE_NAME ] && echo "DEVICE_NAME=$(cat DEVICE_NAME)" >> $GITHUB_ENV
        echo "FILE_DATE=$(date +"%y.%-m.%-d")" >> $GITHUB_ENV

    - name: SSH 链接管理 (仅编译失败或手动勾选时触发)
      uses: P3TERX/ssh2actions@v1.0.0
      if: failure() || (github.event.inputs.ssh == 'true')
      env:
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}

    - name: 查看磁盘使用情况
      if: (!cancelled())
      run: df -hT

    - name: 整理文件并重命名
      id: organize
      if: env.COMPILE_STATUS == 'success' && !cancelled()
      run: |
        cd openwrt/bin/targets/*/*
        rm -rf packages
        echo "FIRMWARE=$PWD" >> $GITHUB_ENV
        echo "ORGANIZE_STATUS=success" >> $GITHUB_ENV

    - name: 上传固件到 artifact
      uses: actions/upload-artifact@main
      if: env.ORGANIZE_STATUS == 'success' && env.UPLOAD_FIRMWARE == 'true' && !cancelled()
      with:
        name: OpenWrt_firmware_${{ env.DEVICE_NAME }}
        path: ${{ env.FIRMWARE }}

    - name: 固件发布
      id: release
      uses: ncipollo/release-action@main
      if: env.ORGANIZE_STATUS == 'success' && env.UPLOAD_RELEASE == 'true' && (!cancelled())
      with:
        tag: v${{ env.FILE_DATE }}-redmi_ax6000
        removeArtifacts: false
        artifacts: ${{ env.FIRMWARE }}/*
        allowUpdates: true
        token: ${{ secrets.GITHUB_TOKEN }}
        body: |
          Redmi AX6000 硬改 512MB Flash 专用固件
          基于 hanwckf/immortalwrt-mt798x (5.4内核)
          
          编译时间: ${{ env.FILE_DATE }}
          管理地址: 10.0.0.1 (root/password)
          Wi-Fi: Ax6000 / cw010203
          
          已集成插件：
          ├ OpenClash / MosDNS / AdGuardHome
          ├ Lucky / Openlist
          └ redmi-ax6000 固件精简版, 闭源驱动

    - name: 发送 Telegram 状态通知
      uses: appleboy/telegram-action@v1.0.1
      if: always()
      with:
        to: ${{ secrets.TELEGRAM_CHAT_ID }}
        token: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        message: |
          项目: ${{ github.repository }}
          状态: ${{ job.status == 'success' && '✅ 编译成功' || '❌ 编译失败' }}
          设备: ${{ env.DEVICE_NAME }}
          时间: ${{ env.FILE_DATE }}
          链接: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

    - name: 删除工作流程运行
      uses: Mattraks/delete-workflow-runs@main
      if: env.ORGANIZE_STATUS == 'success' && (!cancelled())
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        repository: ${{ github.repository }}
        retain_days: 3
        keep_minimum_runs: 2
        delete_workflow_pattern: "Redmi-AX6000-hanwckf"

    - name: 删除旧版本
      uses: dev-drprasad/delete-older-releases@master
      if: env.ORGANIZE_STATUS == 'success' && !cancelled()
      with:
        repo: ${{ github.repository }}
        keep_latest: 2
        delete_tag_pattern: '^v.*-redmi_ax6000$'
        delete_tags: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
